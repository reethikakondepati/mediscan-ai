<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — MediScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="bg-particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>

<nav class="navbar">
    <div class="nav-brand">
        <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:8px;">
            <span class="nav-icon">🏥</span>
            <span class="nav-title">MediScan <span class="highlight">AI</span></span>
        </a>
    </div>
    <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link">Login</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card animate-slide-up">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h2>Create Account</h2>
            <p>Start understanding your health reports</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="Min. 6 characters" required>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="confirm_password" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn-auth">🎉 Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
</body>
</html>
