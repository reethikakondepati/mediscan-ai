services:
  - type: web
    name: mediscan-ai
    env: python
    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr poppler-utils
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TESSERACT_CMD
        value: tesseract
      - key: POPPLER_PATH
        value: /usr/bin